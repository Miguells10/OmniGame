# ╔═══════════════════════════════════════════════════════════════════╗
# ║                    OmniGame AI — Configuration                   ║
# ║  AI-First SaaS for Game Modding & Technical Support              ║
# ╚═══════════════════════════════════════════════════════════════════╝

server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: omnigame-ai

  # ── Supabase PostgreSQL + pgvector ──────────────────────────────
  datasource:
    url: jdbc:postgresql://${SUPABASE_DB_HOST:localhost}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:omnigame}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  # ── Spring AI (OpenAI-compatible — works with Claude via proxy) ─
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${AI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${AI_CHAT_MODEL:gpt-4o}
          temperature: 0.3
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}

# ── Supabase Auth (JWT Validation) ────────────────────────────────
supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:your-supabase-jwt-secret}
    issuer: ${SUPABASE_JWT_ISSUER:https://your-project.supabase.co/auth/v1}

# ── Actuator / Observability ──────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ── CORS (Frontend on port 5173 during development) ──────────────
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    max-age: 3600

# ── Logging ───────────────────────────────────────────────────────
logging:
  level:
    com.omnigame: DEBUG
    org.hibernate.SQL: WARN
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
