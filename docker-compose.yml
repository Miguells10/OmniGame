version: '3.8'

services:
  db:
    # PostgreSQL 16 image loaded with pgvector extension — identical to Supabase's core AI offering
    image: pgvector/pgvector:pg16
    container_name: omnigame_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${SUPABASE_DB_NAME:-omnigame}
    ports:
      - "5432:5432"
    volumes:
      # Inject the main schema to run automatically on first startup
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: omnigame_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SUPABASE_DB_HOST=db
      - SUPABASE_DB_PORT=5432
      - SUPABASE_DB_NAME=${SUPABASE_DB_NAME:-omnigame}
      - SUPABASE_DB_USER=postgres
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD:-postgrespassword}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-your-supabase-jwt-secret}
      - CORS_ORIGINS=http://localhost:5173,http://localhost
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: omnigame_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
    name: omnigame_pgdata
